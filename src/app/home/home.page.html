<div class="cyber-loader-overlay" *ngIf="isLoading">
  <div class="loader-content">
    <div class="glitch-text" data-text="NEXUS">NEXUS</div>
    <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
    <p class="status-msg">SYNC EN COURS...</p>
  </div>
</div>

<ion-content [fullscreen]="true" class="nexus-main-bg">
  <div class="main-container">
    <header class="brand-header">
      <img src="assets/logo.png" class="vortex-logo">
      <h1 class="brand-title">NEXUS</h1>
    </header>

    <section class="schedule-section">
      <div class="schedule-header">
        <h2>Emploi du temps</h2>
        <div class="add-btn-container" (click)="addNewSession()"><ion-icon name="add-outline"></ion-icon></div>
      </div>
      <div class="search-bar">
        <input type="text" placeholder="Filtrer le buffer..." (input)="onSearch($event)">
        <ion-icon name="search-outline"></ion-icon>
      </div>

      <div class="course-list" *ngIf="!isLoading">
        <div class="course-item" *ngFor="let c of filteredCourses" [style.background]="c.displayColor" [class.is-done]="c.isDone" (click)="presentActionSheet(c)">
          <div class="course-time"><span class="start">{{ c.startTime }}</span></div>
          <div class="course-info">
            <span class="course-name">{{ c.name }}</span>
            <span class="course-room"><ion-icon name="location-outline"></ion-icon> {{ c.room }}</span>
          </div>
          <div class="validation-slot" (click)="validateSession(c, $event)">
            <ion-icon [name]="c.isDone ? 'checkmark-circle' : 'play-outline'"></ion-icon>
          </div>
        </div>
      </div>
    </section>
  </div>

  <ion-modal [isOpen]="isModalOpen" (didDismiss)="isModalOpen = false" class="nexus-modal" [breakpoints]="[0, 0.9]" [initialBreakpoint]="0.9">
    <ng-template>
      <div class="modal-content">
        <div class="modal-handle"></div>
        <header class="modal-header"><h3>NOUVELLE MISSION</h3></header>
        <div class="modal-body">
          <label class="section-label">NOM DE L'ACTIVITÉ</label>
          <input type="text" [(ngModel)]="newSessionTitle" placeholder="Ex: Boxe, Anglais...">

          <label class="section-label">CATÉGORIE</label>
          <div class="category-grid">
            <div class="cat-card" [class.active]="selectedType === 'class'" (click)="selectedType = 'class'"><ion-icon name="book-outline"></ion-icon><span>COURS</span></div>
            <div class="cat-card" [class.active]="selectedType === 'sport'" (click)="selectedType = 'sport'"><ion-icon name="fitness-outline"></ion-icon><span>SPORT</span></div>
            <div class="cat-card" [class.active]="selectedType === 'extra'" (click)="selectedType = 'extra'"><ion-icon name="rocket-outline"></ion-icon><span>EXTRA</span></div>
          </div>

          <div *ngIf="selectedType === 'class'" class="fade-in">
            <label class="section-label">PROFESSEUR</label>
            <input type="text" [(ngModel)]="sessionData.teacher">
            <label class="section-label">SALLE</label>
            <input type="text" [(ngModel)]="sessionData.room">
          </div>

          <div *ngIf="selectedType === 'sport'" class="fade-in">
            <label class="section-label">LIEU</label>
            <input type="text" [(ngModel)]="sessionData.place">
            <label class="section-label">INTENSITÉ</label>
            <input type="text" [(ngModel)]="sessionData.intensity">
          </div>

          <div *ngIf="selectedType === 'extra'" class="fade-in">
            <label class="section-label">ORGANISATEUR</label>
            <input type="text" [(ngModel)]="sessionData.organiser">
            <label class="section-label">LIEU</label>
            <input type="text" [(ngModel)]="sessionData.place">
          </div>

          <button class="btn-confirm" (click)="confirmSave()">INJECTER DANS RAILWAY</button>
        </div>
      </div>
    </ng-template>
  </ion-modal>

  <ion-modal [isOpen]="isNotifOpen" (didDismiss)="isNotifOpen = false" class="nexus-hud-modal">
    <ng-template><div class="hud-wrapper"><ion-icon name="shield-checkmark-outline" class="hud-icon"></ion-icon><h3 class="hud-title">{{ notifTitle }}</h3><p class="hud-msg">{{ notifMsg }}</p></div></ng-template>
  </ion-modal>
</ion-content>
