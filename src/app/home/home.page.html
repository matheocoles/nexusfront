<ion-content [fullscreen]="true">
  <div class="main-container">

    <header class="brand-header">
      <div class="logo-container">
        <img src="assets/logo.png" alt="NEXUS Logo" class="vortex-logo">
      </div>
      <h1 class="brand-title">N E X U S</h1>
    </header>

    <section class="archive-section">
      <h2 class="archive-header">Archive</h2>

      <div class="nexus-card" *ngFor="let item of [1, 2]">
        <div class="card-content">
          <div class="text-group">
            <h3 class="item-title">Titre</h3>
            <p class="item-desc">Lorem Ipsum is simply dummy text of the printing and typesetting industry.</p>
          </div>
          <span class="item-duration">25 m</span>
        </div>
      </div>
    </section>

  </div>
</ion-content>
