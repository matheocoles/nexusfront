<div class="cyber-loader-overlay" *ngIf="isLoading">
  <div class="loader-content">
    <div class="glitch-text" data-text="NEXUS">NEXUS</div>
    <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
    <p class="status-msg">INITIALISATION DES DONNEES...</p>
  </div>
</div>

<ion-content [fullscreen]="true" class="nexus-bg">
  <div class="main-wrapper">
    <header class="nexus-header">
      <div class="vortex-container">
        <img src="assets/logo.png" class="vortex-logo">
      </div>

      <div class="top-row">
        <h1 class="page-title">Emploi du temps</h1>
        <div class="add-icon" (click)="addNewSession()">
          <ion-icon name="add-outline"></ion-icon>
        </div>
      </div>

      <div class="search-container">
        <ion-icon name="search-outline"></ion-icon>
        <input type="text" placeholder="Rechercher une mission..." (input)="onSearch($event)">
      </div>

      <div class="date-navigator">
        <ion-icon name="chevron-back-outline" (click)="prevDay()"></ion-icon>
        <span class="current-day">{{ displayDateLabel }}</span>
        <ion-icon name="chevron-forward-outline" (click)="nextDay()"></ion-icon>
      </div>
    </header>

    <div class="session-list fade-in" *ngIf="filteredCourses.length > 0; else noData">
      <div class="session-card"
           *ngFor="let c of filteredCourses; let i = index"
           [style.border-left-color]="c.displayColor"
           [class.completed]="c.isDone"
           (click)="presentActionSheet(c)">

        <div class="card-left">
          <div class="session-number">{{ i + 1 }}</div>
          <div class="time-block">
            <span class="time">{{ c.startTime }}</span>
            <span class="time-end">{{ c.endTime }}</span>
          </div>
        </div>

        <div class="card-center">
          <h3 class="session-name">{{ c.name }}</h3>
          <span class="session-room">{{ c.room }}</span>
        </div>

        <div class="card-right">
          <div class="duration-badge" [style.background]="c.displayColor">
            {{ c.duration }}
          </div>
          <div class="check-trigger" (click)="validateSession(c, $event)">
            <ion-icon [name]="c.isDone ? 'checkmark-circle' : 'ellipse-outline'"></ion-icon>
          </div>
        </div>
      </div>
    </div>

    <ng-template #noData>
      <div class="no-data fade-in" *ngIf="!isLoading">
        <ion-icon name="layers-outline"></ion-icon>
        <p>Aucune mission programmée</p>
      </div>
    </ng-template>
  </div>

  <ion-modal [isOpen]="isModalOpen" (didDismiss)="isModalOpen = false" class="nexus-modal-custom">
    <ng-template>
      <div class="modal-wrapper">
        <div class="handle"></div>
        <h3>{{ isEditing ? 'MODIFIER MISSION' : 'NOUVELLE MISSION' }}</h3>

        <div class="modal-body">
          <div class="input-block">
            <label class="section-label">NOM DE L'ACTIVITÉ</label>
            <input type="text" [(ngModel)]="newSessionTitle" placeholder="Ex: Boxe, Anglais...">
          </div>

          <label class="section-label">PLANIFICATION TEMPORELLE</label>
          <div class="row-inputs">
            <div class="input-block">
              <label>DATE</label>
              <input type="date" [(ngModel)]="selectedStartDate">
            </div>
            <div class="input-block">
              <label>HEURE</label>
              <input type="time" [(ngModel)]="selectedStartTime">
            </div>
          </div>

          <div *ngIf="!isEditing" class="fade-in">
            <label class="section-label">RÉCURRENCE HEBDOMADAIRE</label>
            <select [(ngModel)]="repeatWeeks" class="nexus-select-custom">
              <option [value]="0">Une seule fois</option>
              <option [value]="1">Sur 2 semaines</option>
              <option [value]="3">Sur 1 mois (4 sem.)</option>
              <option [value]="11">Sur un trimestre (12 sem.)</option>
            </select>
          </div>

          <label class="section-label">CATÉGORIE {{ isEditing ? '(Verrouillée)' : '' }}</label>
          <div class="category-grid" [style.opacity]="isEditing ? '0.5' : '1'">
            <div class="cat-card" [class.active]="selectedType === 'class'"
                 (click)="!isEditing && (selectedType = 'class')">
              <ion-icon name="book-outline"></ion-icon><span>COURS</span>
            </div>
            <div class="cat-card" [class.active]="selectedType === 'sport'"
                 (click)="!isEditing && (selectedType = 'sport')">
              <ion-icon name="fitness-outline"></ion-icon><span>SPORT</span>
            </div>
            <div class="cat-card" [class.active]="selectedType === 'extra'"
                 (click)="!isEditing && (selectedType = 'extra')">
              <ion-icon name="rocket-outline"></ion-icon><span>EXTRA</span>
            </div>
          </div>

          <label class="section-label">DURÉE</label>
          <div class="duration-selector">
            <div class="duration-chip" *ngFor="let d of [30, 60, 90, 120]"
                 [class.active]="selectedDuration === d"
                 (click)="selectedDuration = d">{{ d }}m</div>
          </div>

          <button class="btn-confirm" (click)="confirmSave()">
            {{ isEditing ? 'METTRE À JOUR' : 'AJOUTER À LA BDD' }}
          </button>
        </div>
      </div>
    </ng-template>
  </ion-modal>
</ion-content>
