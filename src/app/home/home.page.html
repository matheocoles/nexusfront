<ion-content [fullscreen]="true">
  <div class="main-container">
    <header class="brand-header">
      <div class="logo-container">
        <img src="assets/logo.png" alt="NEXUS" class="vortex-logo">
      </div>
      <h1 class="brand-title">NEXUS</h1>
    </header>

    <section class="schedule-section">
      <div class="schedule-header">
        <h2>Emploi du temps</h2>
        <div class="add-btn-container" (click)="addNewSession()">
          <ion-icon name="add-outline" class="add-btn"></ion-icon>
        </div>
      </div>

      <div class="search-bar">
        <ion-icon name="menu-outline"></ion-icon>
        <input type="text" placeholder="Rechercher une activité...">
        <ion-icon name="search-outline"></ion-icon>
      </div>

      <div *ngIf="isLoading" class="state-container">
        <ion-spinner name="crescent"></ion-spinner>
      </div>

      <div class="schedule-container" *ngIf="!isLoading">
        <div class="date-selector">
          <ion-icon name="chevron-back-outline"></ion-icon>
          <span>AUJOURD'HUI</span>
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </div>

        <div class="course-list">
          <div class="course-item" *ngFor="let c of courses; let i = index"
               [style.background]="c.displayColor" (click)="showToast('Session: ' + c.name)">
            <div class="course-number">{{ i + 1 }}</div>
            <div class="course-time">
              <span class="start">{{ c.startTime }}</span>
              <span class="end">{{ c.endTime }}</span>
            </div>
            <div class="course-info">
              <span class="course-name">{{ c.name }}</span>
              <span class="course-room">{{ c.room }}</span>
            </div>
            <div class="course-duration-badge">{{ c.duration }}</div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <ion-modal [isOpen]="isModalOpen" (didDismiss)="isModalOpen = false" class="nexus-modal"
             [breakpoints]="[0, 0.85]" [initialBreakpoint]="0.85">
    <ng-template>
      <div class="modal-content">
        <div class="modal-handle"></div>

        <header class="modal-header">
          <h3>NOUVELLE ACTIVITÉ</h3>
          <p>Configurez votre prochaine session</p>
        </header>

        <div class="modal-body">
          <div class="input-group">
            <label>TITRE DE L'ACTIVITÉ</label>
            <input type="text" [(ngModel)]="newSessionTitle" placeholder="Ex: Entrainement Pecs...">
          </div>

          <div class="input-group" style="margin-top: 15px;">
            <label>LIEU / SALLE</label>
            <input type="text" [(ngModel)]="newSessionRoom" placeholder="Ex: Salle de muscu, Zone A...">
          </div>

          <label class="section-label" style="margin-top: 20px;">TYPE D'ACTIVITÉ</label>
          <div class="category-grid">
            <div class="cat-card" [class.active]="selectedType === 'class'" (click)="selectedType = 'class'">
              <div class="icon-circle"><ion-icon [icon]="modalIcons.book"></ion-icon></div>
              <span>COURS</span>
            </div>
            <div class="cat-card" [class.active]="selectedType === 'sport'" (click)="selectedType = 'sport'">
              <div class="icon-circle"><ion-icon [icon]="modalIcons.fitness"></ion-icon></div>
              <span>SPORT</span>
            </div>
            <div class="cat-card" [class.active]="selectedType === 'extra'" (click)="selectedType = 'extra'">
              <div class="icon-circle"><ion-icon [icon]="modalIcons.rocket"></ion-icon></div>
              <span>EXTRA</span>
            </div>
          </div>

          <label class="section-label" style="margin-top: 25px;">DURÉE DE LA SESSION</label>
          <div class="duration-selector">
            <div class="duration-chip" [class.active]="selectedDuration === 30" (click)="selectedDuration = 30">30 min</div>
            <div class="duration-chip" [class.active]="selectedDuration === 60" (click)="selectedDuration = 60">1 h</div>
            <div class="duration-chip" [class.active]="selectedDuration === 90" (click)="selectedDuration = 90">1h30</div>
            <div class="duration-chip" [class.active]="selectedDuration === 120" (click)="selectedDuration = 120">2 h</div>
          </div>

          <div class="modal-footer">
            <button class="btn-confirm" (click)="confirmAddSession()">
              CRÉER LA SESSION
              <ion-icon name="checkmark-circle-outline"></ion-icon>
            </button>
          </div>
        </div>
      </div>
    </ng-template>
  </ion-modal>
</ion-content>
