<ion-content [fullscreen]="true">
  <div class="main-container">

    <header class="brand-header">
      <div class="logo-container">
        <img src="assets/logo.png" alt="NEXUS Logo" class="vortex-logo">
      </div>
      <h1 class="brand-title">NEXUS</h1>
    </header>

    <section class="schedule-section">
      <div class="schedule-header">
        <h2>Emploi du temps</h2>
        <ion-icon name="add-outline" class="add-btn" (click)="addNewSession()"></ion-icon>
      </div>

      <div class="search-bar">
        <ion-icon name="menu-outline"></ion-icon>
        <input type="text" placeholder="Rechercher un cours...">
        <ion-icon name="search-outline"></ion-icon>
      </div>

      <div *ngIf="isLoading" class="loader-container" style="text-align: center; padding: 40px;">
        <ion-spinner name="crescent" color="primary"></ion-spinner>
        <p style="color: white; font-size: 0.8rem; margin-top: 10px;">Synchronisation Nexus...</p>
      </div>

      <div class="schedule-container" *ngIf="!isLoading">
        <div class="date-selector">
          <ion-icon name="chevron-back-outline"></ion-icon>
          <span>Today</span>
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </div>

        <div class="course-list" *ngIf="!isLoading">
          <div class="course-item"
               *ngFor="let c of courses; let i = index"
               [style.background]="c.displayColor"
               (click)="startSession(c)">

            <div class="course-number">{{ i + 1 }}</div>

            <div class="course-time">
              <span>{{ c.startTime }}</span>
              <span>{{ c.endTime }}</span>
            </div>

            <div class="course-info">
              <span class="course-name">{{ c.name }}</span>
              <span class="course-room">{{ c.room }}</span>
            </div>

            <div class="course-duration-badge">
              {{ c.duration }}
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <ion-modal [isOpen]="isModalOpen" (didDismiss)="isModalOpen = false" class="nexus-modal">
    <ng-template>
      <header class="modal-header">
        <h3>NOUVELLE ACTIVITÉ</h3>
      </header>

      <div class="modal-body">
        <div class="input-group">
          <label>NOM DE LA SESSION</label>
          <input type="text" [(ngModel)]="newSessionTitle" placeholder="Ex: Musculation, Révision...">
        </div>

        <label class="section-label">CATÉGORIE</label>
        <div class="radio-group">
          <div class="radio-item" [class.active]="selectedType === 'class'" (click)="selectedType = 'class'">
            <ion-icon [icon]="modalIcons.book"></ion-icon> <span>Études</span>
          </div>
          <div class="radio-item" [class.active]="selectedType === 'sport'" (click)="selectedType = 'sport'">
            <ion-icon [icon]="modalIcons.fitness"></ion-icon> <span>Sport</span>
          </div>
          <div class="radio-item" [class.active]="selectedType === 'extra'" (click)="selectedType = 'extra'">
            <ion-icon [icon]="modalIcons.rocket"></ion-icon> <span>Autre</span>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn-cancel" (click)="isModalOpen = false">ANNULER</button>
          <button class="btn-confirm" (click)="confirmAddSession()">DÉMARRER</button>
        </div>
      </div>
    </ng-template>
  </ion-modal>
</ion-content>
